name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress one (a half-applied
# Pages deploy is worse than waiting).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build with Astro
        # withastro/action installs deps (npm, detected from package-lock.json),
        # runs `astro build`, and uploads ./dist as the Pages artifact.
        # Pin Node 22 for the Astro build: @astrojs/mdx requires Node >=22.12.
        # (v6 of the action runs its internal steps on the Node 24 runtime, off
        # the deprecated Node 20 - DEV-25; node-version here is the build Node,
        # separate from that runtime.)
        uses: withastro/action@v6
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
